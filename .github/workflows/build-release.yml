name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/gnosi/electron/package-lock.json'

      - name: Install npm dependencies
        run: |
          cd apps/gnosi/electron
          npm ci

      - name: Setup Python 3.11
        run: |
          brew install python@3.11
          echo "/opt/homebrew/opt/python@3.11/bin" >> $GITHUB_PATH
          python3.11 --version

      - name: Build frontend
        run: |
          cd apps/gnosi/frontend
          npm ci
          npm run build

      - name: Build Python bundle
        run: |
          cd apps/gnosi/electron
          ./build-python.sh

      - name: Build Electron app (macOS ARM64)
        run: |
          cd apps/gnosi/electron
          npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: apps/gnosi/electron/dist/*.dmg
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/gnosi/electron/package-lock.json'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-venv python3-pip

      - name: Install npm dependencies
        run: |
          cd apps/gnosi/electron
          npm ci

      - name: Build frontend
        run: |
          cd apps/gnosi/frontend
          npm ci
          npm run build

      - name: Build Python bundle
        run: |
          cd apps/gnosi/electron
          ./build-python.sh

      - name: Build Electron app (Linux)
        run: |
          cd apps/gnosi/electron
          npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            apps/gnosi/electron/dist/*.AppImage
            apps/gnosi/electron/dist/*.deb
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/gnosi/electron/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install npm dependencies
        run: |
          cd apps/gnosi/electron
          npm ci

      - name: Build frontend
        run: |
          cd apps/gnosi/frontend
          npm ci
          npm run build

      - name: Build Python bundle
        run: |
          cd apps/gnosi/electron
          ./build-python.sh

      - name: Build Electron app (Windows)
        run: |
          cd apps/gnosi/electron
          npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: apps/gnosi/electron/dist/*Setup*.exe
          retention-days: 5

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: true

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*Setup*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

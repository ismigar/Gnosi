appId: com.gnosi.cervell-digital
productName: Cervell Digital
copyright: Copyright © 2026 Ismael Garcia Fernandez

directories:
  output: dist
  buildResources: build

files:
  - main.js
  - preload.js
  - frontend/dist/**/*
  - "!frontend/dist/**/*.map"

extraResources:
  - from: build/
    to: build/
    filter:
      - "**/*"
  - from: dist-python/
    to: python
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Office
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  owner: ismaelgarciafernandez
  repo: projectes
  releaseType: release

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
